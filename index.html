<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>LoveLetter 🌷</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    min-height: 100dvh;
    background: #0d0b18;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    font-family: 'DM Sans', sans-serif;
    -webkit-tap-highlight-color: transparent;
  }

  /* ── STARS ── */
  .stars {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }
  .star {
    position: absolute;
    background: #fff;
    border-radius: 50%;
    animation: twinkle var(--d) ease-in-out infinite;
    opacity: 0;
  }
  @keyframes twinkle {
    0%, 100% { opacity: 0.1; }
    50% { opacity: var(--max-op); }
  }

  /* ── SCENE ── */
  .scene {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 100%;
    padding: 2rem 1.5rem;
  }

  /* ── ENVELOPE ── */
  .envelope-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1.4rem;
    cursor: pointer;
  }

  .envelope {
    position: relative;
    width: 220px;
    height: 150px;
    filter: drop-shadow(0 8px 32px rgba(201,123,123,0.18));
  }

  .env-body {
    position: absolute;
    inset: 0;
    background: #f5e6dc;
    border-radius: 4px;
    border: 1px solid #d4a090;
  }

  /* left triangle */
  .env-body::before {
    content: '';
    position: absolute;
    bottom: 0; left: 0;
    border-bottom: 75px solid #e8c8bb;
    border-right: 110px solid transparent;
  }
  /* right triangle */
  .env-body::after {
    content: '';
    position: absolute;
    bottom: 0; right: 0;
    border-bottom: 75px solid #ddb8a8;
    border-left: 110px solid transparent;
  }

  .env-flap {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 0;
    border-left: 110px solid transparent;
    border-right: 110px solid transparent;
    border-top: 80px solid #e8c8bb;
    transform-origin: top center;
    transition: transform 0.6s cubic-bezier(0.22,1,0.36,1);
    z-index: 3;
  }
  .envelope.open .env-flap {
    transform: rotateX(180deg);
  }

  .env-seal {
    position: absolute;
    top: 44px;
    left: 50%;
    transform: translateX(-50%);
    width: 30px; height: 30px;
    background: #c97b7b;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    color: #fff;
    z-index: 4;
    transition: opacity 0.3s, transform 0.3s;
    box-shadow: 0 2px 8px rgba(201,123,123,0.4);
  }
  .envelope.open .env-seal {
    opacity: 0;
    transform: translateX(-50%) scale(0.5);
  }

  .tap-prompt {
    font-family: 'DM Serif Display', serif;
    font-style: italic;
    font-size: 1rem;
    color: rgba(242,228,223,0.7);
    letter-spacing: 0.05em;
    animation: breathe 2.5s ease-in-out infinite;
  }
  @keyframes breathe {
    0%,100% { opacity: 0.5; }
    50% { opacity: 1; }
  }

  /* ── LETTER ── */
  .letter-wrap {
    display: none;
    flex-direction: column;
    align-items: center;
    width: 100%;
    max-width: 380px;
    animation: riseUp 0.7s cubic-bezier(0.22,1,0.36,1) both;
  }
  .letter-wrap.visible { display: flex; }

  @keyframes riseUp {
    from { opacity: 0; transform: translateY(40px); }
    to   { opacity: 1; transform: translateY(0); }
  }

.letter-paper {
  background: rgba(245,230,220,0.07);
  border: 0.5px solid rgba(242,228,223,0.2);
  border-radius: 12px;
  padding: 2rem 1.8rem 1.6rem;
  width: 100%;
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);

  max-height: 75vh;
  overflow-y: auto;
  overscroll-behavior: contain;
}

/* Elegant scrollbar */
.letter-paper::-webkit-scrollbar {
  width: 4px;
}

.letter-paper::-webkit-scrollbar-thumb {
  background: rgba(201,123,123,0.4);
  border-radius: 10px;
}

.letter-paper::-webkit-scrollbar-track {
  background: transparent;
}

  .letter-dear {
    font-family: 'DM Serif Display', serif;
    font-style: italic;
    font-size: 1.1rem;
    color: #f2c4b0;
    margin-bottom: 1.2rem;
  }

  .letter-body {
    font-size: 0.97rem;
    color: rgba(242,228,223,0.88);
    line-height: 1.9;
    font-weight: 300;
    min-height: 40px;
  }

  .cursor {
    display: inline-block;
    width: 1.5px;
    height: 1em;
    background: #c97b7b;
    margin-left: 1px;
    vertical-align: text-bottom;
    animation: blink 0.9s step-end infinite;
  }
  .cursor.hidden { display: none; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

  .letter-sign {
    margin-top: 1.6rem;
    font-family: 'DM Serif Display', serif;
    font-style: italic;
    font-size: 1rem;
    color: #c97b7b;
    text-align: right;
    opacity: 0;
    transition: opacity 1.2s ease;
  }
  .letter-sign.visible { opacity: 1; }

  /* footer */
  .footer-tag {
    position: fixed;
    bottom: 1.2rem;
    font-family: 'DM Serif Display', serif;
    font-style: italic;
    font-size: 0.8rem;
    color: rgba(242,228,223,0.25);
    letter-spacing: 0.1em;
    z-index: 2;
  }
</style>
</head>
<body>

<!-- Stars -->
<div class="stars" id="stars"></div>

<div class="scene">

  <!-- Envelope (shown first) -->
  <p class="tap-prompt">Three Beautiful Months, A Lifetime Ahead ✨</p>
  <div class="envelope-wrap" id="envelopeWrap">
    <div class="envelope" id="envelope">
      <div class="env-body"></div>
      <div class="env-flap"></div>
      <div class="env-seal">♡</div>
    </div>
    <p class="tap-prompt">tap to open</p>
  </div>

  <!-- Letter (shown after tap) -->
  <div class="letter-wrap" id="letterWrap">
    <div class="letter-paper">
      <div class="letter-dear">Meri Jaan,</div>
      <div class="letter-body" id="letterBody"><span class="cursor" id="cursor"></span></div>
      <div class="letter-sign" id="sign">
        <!-- ✏️ EDIT: change signature below -->
        I Love You So Much Samar,<br>Yours and Only yours,<br>  --Harry
      </div>
    </div>
  </div>

</div>

<p class="footer-tag">#SaHar</p>

<script>
  // ── EDIT YOUR LETTER HERE ──────────────────────────────────────────
  // Each string is one paragraph. Use \n for a line break within a paragraph.
  const letterLines = [
    "Mai bohot dina ton eh letter likhan da soch reha si. Mere dil ch jo twade lyi jazbaat ne, ohna nu shabdan ch pauna asaan nahi si. Bas eh chahunda si ke tusi mera sachcha te rooh wala pyar mehsoos kar sako.",
    "Ajj Maharaj di kirpa naal sade roke nu 3 mahine ho gaye ne. Enna 3 mahineyan ch asi ik-dooje nu samjheya, jaaneya te hor kareeb aaye haan. Har pal mere lyi khaas te yaadgaar hai — har call, har message, har date. Twada hassna, pyar karna, twadi smile, akhan di chamak, te oh nikkian-nikkian gallan... sab kujh dil ch sambhal ke rakhya hoya aa. Zindagi menu jithe vi le jave, main Rab da bohot shukar guzar haan ke tusi mere naal hovoge. Bas ik chhoti jehi arzi aa — kade meri kise gal da bura na maneyo. Je kujh vi hove, mere naal gal kar layo, par kade door na hoeyo. Block ta bilkul vi nahi. ❤️",
    "Samar, menu teri rooh naal pyar aa. Tu meri rooh di khuraak aa. Twade saare nakhre, adiyan, demands te khushiyan meri zimmedari ne. Main hamesha poori koshish karaanga ke twanu kise cheez di kami mehsoos na hove.",
    "Bas ik vaada kariyo — mere ton door na hon di koshish kariyo. Baaki saari zindagi asi ikathe sambhal lavaange."
  ];
  // ──────────────────────────────────────────────────────────────────

  // Stars
  const starsEl = document.getElementById('stars');
  for (let i = 0; i < 90; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() * 2 + 1;
    const maxOp = (Math.random() * 0.5 + 0.3).toFixed(2);
    const dur = (Math.random() * 4 + 3).toFixed(1) + 's';
    const delay = (Math.random() * 6).toFixed(1) + 's';
    s.style.cssText = `width:${size}px;height:${size}px;top:${Math.random()*100}%;left:${Math.random()*100}%;--d:${dur};--max-op:${maxOp};animation-delay:${delay}`;
    starsEl.appendChild(s);
  }

  // Tap envelope
  document.getElementById('envelopeWrap').addEventListener('click', openLetter);
  document.getElementById('envelopeWrap').addEventListener('touchend', e => { e.preventDefault(); openLetter(); });

  function openLetter() {
    const env = document.getElementById('envelope');
    env.classList.add('open');

    setTimeout(() => {
      document.getElementById('envelopeWrap').style.display = 'none';
      document.getElementById('letterWrap').classList.add('visible');
      typeLines(letterLines, 0, '');
    }, 700);
  }

  // Typing engine
  const bodyEl = document.getElementById('letterBody');
  const cursorEl = document.getElementById('cursor');
  const signEl = document.getElementById('sign');

  function typeLines(lines, lineIdx, built) {
    if (lineIdx >= lines.length) {
      cursorEl.classList.add('hidden');
      signEl.classList.add('visible');
      return;
    }
    const line = lines[lineIdx];
    const prefix = built;
    let charIdx = 0;

    function typeChar() {
      if (charIdx <= line.length) {
        const current = prefix + (lineIdx > 0 ? '\n\n' : '') + line.slice(0, charIdx);
        bodyEl.innerHTML = current.replace(/\n/g, '<br>') + '<span class="cursor" id="cursor"></span>';
        charIdx++;
        setTimeout(typeChar, 28 + Math.random() * 22);
      } else {
        const newBuilt = prefix + (lineIdx > 0 ? '\n\n' : '') + line;
        setTimeout(() => typeLines(lines, lineIdx + 1, newBuilt), 520);
      }
    }
    typeChar();
  }
</script>
</body>
</html>
