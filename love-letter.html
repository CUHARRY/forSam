<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>For you 🌸</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    min-height: 100dvh;
    background: #fde8f0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    font-family: 'DM Sans', sans-serif;
    -webkit-tap-highlight-color: transparent;
    position: relative;
  }

  /* ── GRADIENT BG ── */
  .bg-gradient {
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 20% 20%, #ffd6e8 0%, transparent 55%),
      radial-gradient(ellipse at 80% 10%, #f9d0f0 0%, transparent 50%),
      radial-gradient(ellipse at 70% 80%, #fce4c8 0%, transparent 55%),
      radial-gradient(ellipse at 10% 85%, #d8eeff 0%, transparent 50%),
      #fde8f0;
    z-index: 0;
  }

  /* ── FLOATING PETALS ── */
  .petals {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 1;
    overflow: hidden;
  }
  .petal {
    position: absolute;
    top: -40px;
    font-size: var(--fs);
    opacity: 0.55;
    animation: fall var(--dur) linear var(--delay) infinite;
  }
  @keyframes fall {
    0%   { transform: translateY(0) translateX(0) rotate(0deg); opacity: 0; }
    10%  { opacity: 0.55; }
    90%  { opacity: 0.4; }
    100% { transform: translateY(110vh) translateX(var(--sway)) rotate(360deg); opacity: 0; }
  }

  /* ── SCENE ── */
  .scene {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 100%;
    padding: 2rem 1.5rem;
  }

  /* ── ENVELOPE ── */
  .envelope-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1.6rem;
    cursor: pointer;
  }

  .envelope-title {
    font-family: 'DM Serif Display', serif;
    font-style: italic;
    font-size: 1.15rem;
    color: #b05580;
    letter-spacing: 0.03em;
    text-align: center;
  }

  .envelope {
    position: relative;
    width: 220px;
    height: 148px;
    filter: drop-shadow(0 12px 36px rgba(220,130,170,0.28));
    transition: transform 0.2s;
  }
  .envelope:active { transform: scale(0.97); }

  .env-body {
    position: absolute;
    inset: 0;
    background: #fff0f5;
    border-radius: 6px;
    border: 1px solid #f0b8cf;
  }
  .env-body::before {
    content: '';
    position: absolute;
    bottom: 0; left: 0;
    border-bottom: 74px solid #fcd8e8;
    border-right: 110px solid transparent;
    border-radius: 0 0 0 6px;
  }
  .env-body::after {
    content: '';
    position: absolute;
    bottom: 0; right: 0;
    border-bottom: 74px solid #f8c8dd;
    border-left: 110px solid transparent;
    border-radius: 0 0 6px 0;
  }

  .env-flap {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 0;
    border-left: 110px solid transparent;
    border-right: 110px solid transparent;
    border-top: 80px solid #fcd8e8;
    transform-origin: top center;
    transition: transform 0.65s cubic-bezier(0.22,1,0.36,1);
    z-index: 3;
  }
  .envelope.open .env-flap {
    transform: rotateX(180deg);
  }

  .env-seal {
    position: absolute;
    top: 42px;
    left: 50%;
    transform: translateX(-50%);
    width: 32px; height: 32px;
    background: linear-gradient(135deg, #f472b6, #e879a0);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px;
    color: #fff;
    z-index: 4;
    transition: opacity 0.3s, transform 0.3s;
    box-shadow: 0 3px 12px rgba(244,114,182,0.45);
  }
  .envelope.open .env-seal {
    opacity: 0;
    transform: translateX(-50%) scale(0.4);
  }

  .tap-prompt {
    font-family: 'DM Serif Display', serif;
    font-style: italic;
    font-size: 1rem;
    color: #d4789e;
    letter-spacing: 0.06em;
    animation: breathe 2.4s ease-in-out infinite;
  }
  @keyframes breathe {
    0%,100% { opacity: 0.45; transform: translateY(0); }
    50%      { opacity: 1; transform: translateY(-3px); }
  }

  /* decorative hearts around envelope */
  .deco-hearts {
    position: absolute;
    inset: 0;
    pointer-events: none;
  }
  .dh {
    position: absolute;
    font-size: var(--s);
    opacity: 0.18;
    animation: floatHeart var(--d) ease-in-out infinite;
    animation-delay: var(--dl);
  }
  @keyframes floatHeart {
    0%,100% { transform: translateY(0) scale(1); }
    50%      { transform: translateY(-8px) scale(1.08); }
  }

  /* ── LETTER ── */
  .letter-wrap {
    display: none;
    flex-direction: column;
    align-items: center;
    width: 100%;
    max-width: 390px;
  }
  .letter-wrap.visible {
    display: flex;
    animation: riseUp 0.7s cubic-bezier(0.22,1,0.36,1) both;
  }
  @keyframes riseUp {
    from { opacity: 0; transform: translateY(36px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .letter-paper {
    background: rgba(255,245,250,0.82);
    border: 1px solid #f0c8da;
    border-radius: 16px;
    padding: 2rem 1.8rem 1.6rem;
    width: 100%;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    box-shadow:
      0 4px 24px rgba(220,130,170,0.12),
      0 1px 0 #fff inset;
    position: relative;
    overflow: hidden;
  }

  /* soft corner roses */
  .letter-paper::before {
    content: '🌸';
    position: absolute;
    top: 10px; right: 14px;
    font-size: 1.1rem;
    opacity: 0.35;
  }
  .letter-paper::after {
    content: '🌸';
    position: absolute;
    bottom: 10px; left: 14px;
    font-size: 1.1rem;
    opacity: 0.35;
  }

  .letter-dear {
    font-family: 'DM Serif Display', serif;
    font-style: italic;
    font-size: 1.15rem;
    color: #c0527a;
    margin-bottom: 1.2rem;
  }

  .letter-body {
    font-size: 0.96rem;
    color: #6b3a52;
    line-height: 1.95;
    font-weight: 300;
    min-height: 40px;
  }

  .cursor {
    display: inline-block;
    width: 1.5px;
    height: 1em;
    background: #e879a0;
    margin-left: 1px;
    vertical-align: text-bottom;
    animation: blink 0.9s step-end infinite;
  }
  .cursor.hidden { display: none; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

  .letter-sign {
    margin-top: 1.6rem;
    font-family: 'DM Serif Display', serif;
    font-style: italic;
    font-size: 1.05rem;
    color: #c0527a;
    text-align: right;
    opacity: 0;
    transition: opacity 1.4s ease;
    padding-right: 0.2rem;
  }
  .letter-sign.visible { opacity: 1; }

  .hearts-ending {
    text-align: center;
    margin-top: 1rem;
    font-size: 1.1rem;
    opacity: 0;
    transition: opacity 1.6s ease 0.4s;
    letter-spacing: 0.25em;
  }
  .hearts-ending.visible { opacity: 1; }

  /* ── FOOTER ── */
  .footer-tag {
    position: fixed;
    bottom: 1.1rem;
    font-family: 'DM Serif Display', serif;
    font-style: italic;
    font-size: 0.78rem;
    color: #d4789e;
    opacity: 0.55;
    letter-spacing: 0.12em;
    z-index: 3;
  }
</style>
</head>
<body>

<div class="bg-gradient"></div>

<!-- Falling petals -->
<div class="petals" id="petals"></div>

<div class="scene">

  <!-- Envelope -->
  <div class="envelope-wrap" id="envelopeWrap">
    <p class="envelope-title">something for you 🌷</p>

    <div style="position:relative; display:inline-block;">
      <div class="deco-hearts">
        <span class="dh" style="--s:1.4rem;--d:3.2s;--dl:0s;top:10%;left:-18%">♡</span>
        <span class="dh" style="--s:1rem;--d:2.8s;--dl:0.5s;top:30%;right:-16%">♡</span>
        <span class="dh" style="--s:1.6rem;--d:3.8s;--dl:1s;bottom:10%;left:-20%">♡</span>
        <span class="dh" style="--s:0.9rem;--d:2.5s;--dl:1.5s;bottom:20%;right:-14%">♡</span>
      </div>
      <div class="envelope" id="envelope">
        <div class="env-body"></div>
        <div class="env-flap"></div>
        <div class="env-seal">♡</div>
      </div>
    </div>

    <p class="tap-prompt">tap to open</p>
  </div>

  <!-- Letter -->
  <div class="letter-wrap" id="letterWrap">
    <div class="letter-paper">
      <div class="letter-dear">Meri Jaaan,</div>
      <div class="letter-body" id="letterBody"><span class="cursor" id="cursor"></span></div>
      <div class="letter-sign" id="sign">
        I Love You So Much Samar,<br>Yours and Only yours,<br>
        <!-- ✏️ EDIT: replace with his name -->
         Harry
      </div>
    </div>
    <div class="hearts-ending" id="heartsEnd">🌸 ♡ 🌸</div>
  </div>

</div>

<p class="footer-tag">#SaHar</p>

<script>
  // ── EDIT YOUR LETTER HERE ─────────────────────────────────────────
  const letterLines = [
    "Samajh nahi aa raha ki ehna jazbaatan nu lafzan 'ch kive likhan, par kaafi dinan ton eh likhan di koshish kar riha si.",
    "Tuhade naal bitaaye eh tinn mahine kise supne varge rahe ne—oh supna jo main sochya si kade sach nahi hona.Tusi hauli jehe meri zindagi 'ch aaye, te kaafi kuch badal ditta.",
    "Mainu tuhadi har nikki nikki gall yaad ae. Twada Pyar, Twada Pain, Twada Gussa, Twada Fikar, Twade Touch, Twada Mazaak, Twada Sab kuchh Save Kari baitha Dil ch.",
    "Agge zindagi jithe vi lai ke jaave, main bahut shukar-guzar han ki meri zindagi 'ch tusi ho.",
    "Bs Ik Arzi hai, Kadi meri kisi gal nu galat na smajna, na menu block krna, Baki twade Nakhre, Naraazgi, Khushiyan, Sab Demands twade kehn to pehle pooriyan krniya ne mai.",
  ];
  // ─────────────────────────────────────────────────────────────────

  // Falling petals
  const petalsEl = document.getElementById('petals');
  const petalChars = ['🌸','🌷','✿','❀','🌺'];
  for (let i = 0; i < 18; i++) {
    const p = document.createElement('div');
    p.className = 'petal';
    const fs = (Math.random() * 14 + 10).toFixed(0) + 'px';
    const dur = (Math.random() * 8 + 7).toFixed(1) + 's';
    const delay = (Math.random() * 10).toFixed(1) + 's';
    const sway = ((Math.random() - 0.5) * 120).toFixed(0) + 'px';
    const left = (Math.random() * 100).toFixed(1) + '%';
    p.style.cssText = `--fs:${fs};--dur:${dur};--delay:${delay};--sway:${sway};left:${left}`;
    p.textContent = petalChars[Math.floor(Math.random() * petalChars.length)];
    petalsEl.appendChild(p);
  }

  // Tap to open
  const envWrap = document.getElementById('envelopeWrap');
  envWrap.addEventListener('click', openLetter);
  envWrap.addEventListener('touchend', e => { e.preventDefault(); openLetter(); });

  let opened = false;
  function openLetter() {
    if (opened) return;
    opened = true;
    document.getElementById('envelope').classList.add('open');
    setTimeout(() => {
      envWrap.style.display = 'none';
      document.getElementById('letterWrap').classList.add('visible');
      typeLines(letterLines, 0, '');
    }, 750);
  }

  // Typing
  const bodyEl  = document.getElementById('letterBody');
  const signEl  = document.getElementById('sign');
  const heartsEl = document.getElementById('heartsEnd');

  function typeLines(lines, idx, built) {
    if (idx >= lines.length) {
      // remove cursor, show sign
      bodyEl.innerHTML = built.replace(/\n/g, '<br>');
      signEl.classList.add('visible');
      heartsEl.classList.add('visible');
      return;
    }
    const separator = idx > 0 ? '\n\n' : '';
    const line = lines[idx];
    let charIdx = 0;

    function typeChar() {
      if (charIdx <= line.length) {
        const current = built + separator + line.slice(0, charIdx);
        bodyEl.innerHTML = current.replace(/\n/g, '<br>') + '<span class="cursor"></span>';
        charIdx++;
        setTimeout(typeChar, 26 + Math.random() * 150);
      } else {
        setTimeout(() => typeLines(lines, idx + 1, built + separator + line), 500);
      }
    }
    typeChar();
  }
</script>
</body>
</html>
